# ============================================================================
# scheduler.ini — Ofelia cron scheduler for FG agent runs
# Runs inside the scheduler container, triggers the agents container
#
# Times are UTC. Adjust to match your team's timezone offset.
#   EST = UTC-5  |  CST = UTC-6  |  PST = UTC-8
# ============================================================================

[job-run "pm-agent-morning"]
schedule  = 0 11 * * *
container = fg_agents
command   = run_pm_agent
# 6:00 AM EST daily — PM Agent scaffolds charter + WBS

[job-run "ba-qa-midday"]
schedule  = 0 14 * * *
container = fg_agents
command   = check_approvals
# 9:00 AM EST daily — check pending approvals, surface to team

[job-run "manager-report-eod"]
schedule  = 0 22 * * *
container = fg_agents
command   = budget_status
# 5:00 PM EST daily — end-of-day budget + portfolio status

[job-run "budget-health"]
schedule  = 0 */4 * * *
container = fg_agents
command   = budget_status
# Every 4 hours — check agent budget and spending status
